<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8">
		<style>
			body,html{
				width:100%;
				height:100%;
				margin:0px;
				padding:0px;
			}
			body{
				display:flex;
				justify-content:center;
				align-items:center;
				font-family:monospace;
				background:url(blancotrans.png),url(blancotrans.png),url(fondo.jpg);
				background-size:cover;
			}
			main{
				width:300px;
				height:37px;
				border:1px solid lightgrey;
				padding:20px;
				display:flex;
				flex-direction:column;
				justify-content:flex-end;
				overflow:hidden;
				background:rgba(0,0,0,0.5);
				transition:height 0.5s ease;
				backdrop-filter:blur(5px);
				border-radius:5px;
				box-shadow:0px 5px 10px rgba(0,0,0,0.4);
			}
			main.abierto{
				height:500px;
				justify-content:space-between;
			}
			section{
				display:flex;
				flex-direction:column;
				gap:10px;
				overflow-y:auto;
				flex:1;
				opacity:0;
				transition:opacity 0.3s ease;
				pointer-events:none;
			}
			main.abierto section{
				opacity:1;
				pointer-events:auto;
			}
			input{
				border:1px solid lightgrey;
				padding:10px;
				outline:none;
				color:grey;
				font-family:monospace;
			}
			article{
				background:lightgrey;
				padding:10px;
				border-radius:5px;
				width:80%;
				box-sizing:border-box;
				word-break:break-word;
			}
			.p{
				background:rgb(200,255,200);
				border-radius:0px 5px 5px 5px;
				align-self:flex-start;
			}
			.r{
				background:rgb(200,255,255);
				border-radius:5px 0px 5px 5px;
				align-self:flex-end;
			}
		</style>
	</head>
	<body>
		<main>
			<section></section>
			<input type="text" placeholder="Introduce tu pregunta">
		</main>
		<script>
			let entrada = document.querySelector("input")
			let seccion = document.querySelector("section")
			let main = document.querySelector("main")
			let primeraPregunta = true

			entrada.onkeypress = function(tecla){
				if(tecla.charCode == 13){
					let valor = this.value.trim()
					if(valor == ""){return}

					this.value = ""

					if(primeraPregunta){
						main.classList.add("abierto")
						primeraPregunta = false
					}

					let articuloPregunta = document.createElement("article")
					articuloPregunta.classList.add("p")
					articuloPregunta.textContent = valor
					seccion.appendChild(articuloPregunta)
					seccion.scrollTop = seccion.scrollHeight

					fetch("b002-back con IA.php", {
						method: "POST",
						headers: {
							"Content-Type": "application/json"
						},
						body: JSON.stringify({ mensaje: valor })
					})
					.then(function(respuesta){
						return respuesta.text()
					})
					.then(function(datos){
						let articuloRespuesta = document.createElement("article")
						articuloRespuesta.classList.add("r")
						articuloRespuesta.textContent = datos
						seccion.appendChild(articuloRespuesta)
						seccion.scrollTop = seccion.scrollHeight
					})
				}
			}
		</script>
	</body>
</html>
