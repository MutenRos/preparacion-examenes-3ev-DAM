<!doctype html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
    margin:0;
    padding:20px;
    font-family:Ubuntu,sans-serif;
    background:#f0f0f0;
}

ul,li{
    padding:0;
    margin:0;
    list-style-type:none;
}

ul{
    display:flex;
    flex-direction:column;
    gap:8px;
    counter-reset:item;
}

li{
    counter-increment:item;
    background:black;
    color:white;
    padding:10px 10px 10px 48px;
    border-radius:8px;
    outline:none;
    position:relative;
    min-height:22px;
    animation:appear 0.25s ease-out;
    transition:transform 0.2s, opacity 0.2s, height 0.2s, margin 0.2s, padding 0.2s;
}

li::before{
    content:counter(item);
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    width:24px;
    height:24px;
    border-radius:50%;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:bold;
}

li.removing{
    opacity:0;
    transform:translateX(-20px) scale(0.95);
    height:0;
    min-height:0;
    padding-top:0;
    padding-bottom:0;
    margin:0;
    overflow:hidden;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(-10px) scale(0.96);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}
</style>
</head>
<body>

<input type="file" id="abrirArchivo" accept=".txt" hidden>

<ul id="lista"></ul>

<script>
const lista = document.getElementById("lista");
const abrirArchivo = document.getElementById("abrirArchivo");
const STORAGE_KEY = "presentacion_items";

cargarLocalStorage();

lista.addEventListener("input", guardarLocalStorage);

lista.addEventListener("keydown", function(e){

    const actual = document.activeElement;

    if(!actual || actual.tagName !== "LI") return;

    if(e.key === "Enter"){
        e.preventDefault();

        const nuevo = crearLi("");

        actual.insertAdjacentElement("afterend", nuevo);
        nuevo.focus();

        guardarLocalStorage();
    }

    if(e.key === "Backspace"){
        const texto = actual.textContent.trim();

        if(texto === ""){
            e.preventDefault();

            if(lista.children.length === 1) return;

            const anterior = actual.previousElementSibling;
            const siguiente = actual.nextElementSibling;

            actual.classList.add("removing");

            setTimeout(()=>{
                actual.remove();

                if(anterior){
                    moverCursorFinal(anterior);
                }else if(siguiente){
                    moverCursorFinal(siguiente);
                }

                guardarLocalStorage();
            },200);
        }
    }
});

document.addEventListener("keydown", function(e){

    if(!e.ctrlKey) return;

    const tecla = e.key.toLowerCase();

    if(tecla === "n"){
        e.preventDefault();
        resetear();
    }

    if(tecla === "s"){
        e.preventDefault();
        guardarTxt();
    }

    if(tecla === "o"){
        e.preventDefault();
        abrirArchivo.click();
    }

});

abrirArchivo.addEventListener("change", function(){

    const archivo = abrirArchivo.files[0];
    if(!archivo) return;

    const lector = new FileReader();

    lector.onload = function(){
        const texto = lector.result;
        cargarDesdeTexto(texto);
        guardarLocalStorage();
        abrirArchivo.value = "";
    };

    lector.readAsText(archivo);
});

function crearLi(texto){
    const li = document.createElement("li");
    li.contentEditable = true;
    li.textContent = texto;
    return li;
}

function obtenerItems(){
    return [...lista.querySelectorAll("li")]
        .map(li => li.textContent.trim());
}

function guardarLocalStorage(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(obtenerItems()));
}

function cargarLocalStorage(){
    const datos = localStorage.getItem(STORAGE_KEY);

    if(datos){
        try{
            const items = JSON.parse(datos);
            cargarItems(items.length ? items : ["Presentacion"]);
        }catch(e){
            cargarItems(["Presentacion"]);
        }
    }else{
        cargarItems(["Presentacion"]);
    }
}

function cargarItems(items){
    lista.innerHTML = "";

    items.forEach(texto=>{
        lista.appendChild(crearLi(texto));
    });

    if(lista.children.length === 0){
        lista.appendChild(crearLi("Presentacion"));
    }
}

function resetear(){
    localStorage.removeItem(STORAGE_KEY);
    cargarItems(["Presentacion"]);
    lista.children[0].focus();
    guardarLocalStorage();
}

function guardarTxt(){
    const contenido = obtenerItems().join("\n");

    const blob = new Blob([contenido], {
        type:"text/plain;charset=utf-8"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "presentacion.txt";
    a.click();

    URL.revokeObjectURL(url);
}

function cargarDesdeTexto(texto){
    const items = texto
        .split(/\r?\n/)
        .map(linea => linea.trim())
        .filter(linea => linea !== "");

    cargarItems(items.length ? items : ["Presentacion"]);
}

function moverCursorFinal(elemento){
    elemento.focus();

    const rango = document.createRange();
    rango.selectNodeContents(elemento);
    rango.collapse(false);

    const seleccion = window.getSelection();
    seleccion.removeAllRanges();
    seleccion.addRange(rango);
}
</script>

</body>
</html>
