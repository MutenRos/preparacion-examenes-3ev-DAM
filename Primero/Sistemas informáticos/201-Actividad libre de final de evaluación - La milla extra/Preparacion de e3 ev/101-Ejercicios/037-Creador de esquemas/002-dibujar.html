<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SVG Draw</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f2f2f2;
}
svg{
    width:100vw;
    height:100vh;
    display:block;
    background:white;
    cursor:crosshair;
}
</style>
</head>
<body>

<svg id="canvas"></svg>

<script>
const svg = document.getElementById("canvas");

let drawing = false;
let currentPath = null;

function getPoint(event){
    const rect = svg.getBoundingClientRect();

    return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
    };
}

function startDraw(event){
    drawing = true;

    const p = getPoint(event);

    currentPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
    currentPath.setAttribute("fill", "none");
    currentPath.setAttribute("stroke", "black");
    currentPath.setAttribute("stroke-width", "4");
    currentPath.setAttribute("stroke-linecap", "round");
    currentPath.setAttribute("stroke-linejoin", "round");
    currentPath.setAttribute("d", `M ${p.x} ${p.y}`);

    svg.appendChild(currentPath);
}

function draw(event){
    if(!drawing) return;

    const p = getPoint(event);
    const d = currentPath.getAttribute("d");

    currentPath.setAttribute("d", `${d} L ${p.x} ${p.y}`);
}

function stopDraw(){
    drawing = false;
    currentPath = null;
}

svg.addEventListener("mousedown", startDraw);
svg.addEventListener("mousemove", draw);
window.addEventListener("mouseup", stopDraw);

svg.addEventListener("touchstart", function(event){
    event.preventDefault();
    startDraw(event.touches[0]);
});

svg.addEventListener("touchmove", function(event){
    event.preventDefault();
    draw(event.touches[0]);
});

window.addEventListener("touchend", stopDraw);
</script>

</body>
</html>
