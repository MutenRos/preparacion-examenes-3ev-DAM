<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>jocarsa | dibujo</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#e8e8e8;
    font-family:Ubuntu,Arial,sans-serif;
}

svg{
    width:100vw;
    height:100vh;
    display:block;
    background:white;
    cursor:crosshair;
    touch-action:none;
}

#ui{
    position:fixed;
    top:18px;
    left:18px;
    z-index:10;
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    border-radius:18px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(12px);
    box-shadow:0 10px 35px rgba(0,0,0,0.16);
    user-select:none;
    flex-wrap:wrap;
}

#brand{
    font-weight:700;
    font-size:15px;
    white-space:nowrap;
}

#brand span{
    font-weight:400;
    opacity:0.65;
}

.group{
    display:flex;
    align-items:center;
    gap:8px;
}

.label{
    font-size:12px;
    opacity:0.55;
}

button{
    cursor:pointer;
}

.tool-btn,
.action-btn{
    border:0;
    padding:7px 11px;
    border-radius:999px;
    background:#eee;
}

.tool-btn.active{
    background:#111;
    color:white;
}

.color-btn{
    width:24px;
    height:24px;
    border-radius:50%;
    border:2px solid white;
    outline:1px solid rgba(0,0,0,0.2);
}

.color-btn.active{
    outline:3px solid black;
}

.width-btn{
    width:34px;
    height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:0;
    border-radius:999px;
    background:#eee;
}

.width-btn.active{
    background:#111;
}

.width-dot{
    display:block;
    border-radius:50%;
    background:#111;
}

.width-btn.active .width-dot{
    background:white;
}

.selected{
    filter:drop-shadow(0 0 4px #2563eb);
}

#fileInput{
    display:none;
}
</style>
</head>
<body>

<div id="ui">
    <div id="brand">jocarsa <span>| dibujo</span></div>

    <div class="group">
        <div class="label">Herramienta</div>
        <button class="tool-btn active" data-tool="select">Seleccionar</button>
        <button class="tool-btn" data-tool="pen">Lápiz</button>
        <button class="tool-btn" data-tool="arrow">Flecha</button>
        <button class="tool-btn" data-tool="text">Texto</button>
    </div>

    <div class="group">
        <div class="label">Color</div>
        <button class="color-btn active" data-color="#111111" style="background:#111111"></button>
        <button class="color-btn" data-color="#e63946" style="background:#e63946"></button>
        <button class="color-btn" data-color="#2a9d8f" style="background:#2a9d8f"></button>
        <button class="color-btn" data-color="#457b9d" style="background:#457b9d"></button>
        <button class="color-btn" data-color="#f4a261" style="background:#f4a261"></button>
        <input id="colorPicker" type="color" value="#111111">
    </div>

    <div class="group">
        <div class="label">Grosor</div>
        <button class="width-btn active" data-width="2">
            <span class="width-dot" style="width:4px;height:4px"></span>
        </button>
        <button class="width-btn" data-width="4">
            <span class="width-dot" style="width:7px;height:7px"></span>
        </button>
        <button class="width-btn" data-width="8">
            <span class="width-dot" style="width:11px;height:11px"></span>
        </button>
        <button class="width-btn" data-width="14">
            <span class="width-dot" style="width:16px;height:16px"></span>
        </button>
    </div>

    <div class="group">
        <button id="newBtn" class="action-btn">Nuevo</button>
        <button id="saveBtn" class="action-btn">Guardar SVG</button>
        <button id="openBtn" class="action-btn">Abrir SVG</button>
    </div>
</div>

<input id="fileInput" type="file" accept=".svg,image/svg+xml">

<svg id="svg">
    <defs>
        <marker id="arrowHead"
            markerWidth="10"
            markerHeight="10"
            refX="8"
            refY="3"
            orient="auto"
            markerUnits="strokeWidth">
            <path d="M 0 0 L 8 3 L 0 6 Z" fill="context-stroke"></path>
        </marker>
    </defs>

    <g id="viewport"></g>
</svg>

<script>
const STORAGE_KEY = "jocarsa_dibujo_svg_v3";

const svg = document.getElementById("svg");
const viewport = document.getElementById("viewport");
const fileInput = document.getElementById("fileInput");

const colorButtons = document.querySelectorAll(".color-btn");
const widthButtons = document.querySelectorAll(".width-btn");
const toolButtons = document.querySelectorAll(".tool-btn");
const colorPicker = document.getElementById("colorPicker");

const newBtn = document.getElementById("newBtn");
const saveBtn = document.getElementById("saveBtn");
const openBtn = document.getElementById("openBtn");

let tool = "select";

let drawing = false;
let panning = false;
let moving = false;

let currentElement = null;
let selectedElement = null;
let points = [];

let currentColor = "#111111";
let currentWidth = 2;

const MIN_DISTANCE = 6;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

let panStartX = 0;
let panStartY = 0;
let panStartOffsetX = 0;
let panStartOffsetY = 0;

let moveStartPoint = null;
let originalAttrs = null;

function updateTransform(){
    viewport.setAttribute(
        "transform",
        `translate(${offsetX},${offsetY}) scale(${scale})`
    );
}

function screenToWorld(x,y){
    return {
        x:(x - offsetX) / scale,
        y:(y - offsetY) / scale
    };
}

function getPoint(event){
    const rect = svg.getBoundingClientRect();

    return screenToWorld(
        event.clientX - rect.left,
        event.clientY - rect.top
    );
}

function distance(a,b){
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function pointsToPath(points){
    if(points.length < 2) return "";

    let d = `M ${points[0].x} ${points[0].y}`;

    for(let i=1;i<points.length-1;i++){
        const p = points[i];
        const n = points[i+1];

        const mx = (p.x + n.x)/2;
        const my = (p.y + n.y)/2;

        d += ` Q ${p.x} ${p.y} ${mx} ${my}`;
    }

    const last = points[points.length-1];
    d += ` L ${last.x} ${last.y}`;

    return d;
}

function autoSave(){
    localStorage.setItem(STORAGE_KEY, viewport.innerHTML);
}

function autoLoad(){
    const saved = localStorage.getItem(STORAGE_KEY);

    if(saved){
        viewport.innerHTML = saved;
    }
}

function clearSelection(){
    if(selectedElement){
        selectedElement.classList.remove("selected");
    }

    selectedElement = null;
}

function selectElement(element){
    clearSelection();

    selectedElement = element;
    selectedElement.classList.add("selected");
}

function isDrawableElement(element){
    return element && element.parentNode === viewport;
}

function createPen(point){
    points = [point];

    currentElement = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "path"
    );

    currentElement.setAttribute("fill","none");
    currentElement.setAttribute("stroke",currentColor);
    currentElement.setAttribute("stroke-width",currentWidth);
    currentElement.setAttribute("stroke-linecap","round");
    currentElement.setAttribute("stroke-linejoin","round");

    viewport.appendChild(currentElement);
}

function createArrow(point){
    currentElement = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "line"
    );

    currentElement.setAttribute("x1",point.x);
    currentElement.setAttribute("y1",point.y);
    currentElement.setAttribute("x2",point.x);
    currentElement.setAttribute("y2",point.y);
    currentElement.setAttribute("stroke",currentColor);
    currentElement.setAttribute("stroke-width",currentWidth);
    currentElement.setAttribute("stroke-linecap","round");
    currentElement.setAttribute("marker-end","url(#arrowHead)");

    viewport.appendChild(currentElement);
}

function createText(point){
    const contenido = prompt("Introduce el texto:");

    if(!contenido) return;

    const text = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "text"
    );

    text.setAttribute("x",point.x);
    text.setAttribute("y",point.y);
    text.setAttribute("fill",currentColor);
    text.setAttribute("font-size",currentWidth * 8 + 12);
    text.setAttribute("font-family","Ubuntu, Arial, sans-serif");
    text.setAttribute("data-editable","true");
    text.textContent = contenido;

    viewport.appendChild(text);
    autoSave();
}

function editText(textElement){
    const nuevoTexto = prompt("Editar texto:", textElement.textContent);

    if(nuevoTexto === null) return;

    if(nuevoTexto.trim() === ""){
        textElement.remove();
        clearSelection();
    }else{
        textElement.textContent = nuevoTexto;
    }

    autoSave();
}

function getOriginalAttrs(element){
    if(element.tagName === "line"){
        return {
            x1:parseFloat(element.getAttribute("x1")),
            y1:parseFloat(element.getAttribute("y1")),
            x2:parseFloat(element.getAttribute("x2")),
            y2:parseFloat(element.getAttribute("y2"))
        };
    }

    if(element.tagName === "text"){
        return {
            x:parseFloat(element.getAttribute("x")),
            y:parseFloat(element.getAttribute("y"))
        };
    }

    return {
        transform:element.getAttribute("transform") || ""
    };
}

function moveElement(element,dx,dy){
    if(element.tagName === "line"){
        element.setAttribute("x1",originalAttrs.x1 + dx);
        element.setAttribute("y1",originalAttrs.y1 + dy);
        element.setAttribute("x2",originalAttrs.x2 + dx);
        element.setAttribute("y2",originalAttrs.y2 + dy);
        return;
    }

    if(element.tagName === "text"){
        element.setAttribute("x",originalAttrs.x + dx);
        element.setAttribute("y",originalAttrs.y + dy);
        return;
    }

    element.setAttribute(
        "transform",
        `${originalAttrs.transform} translate(${dx},${dy})`
    );
}

function startPan(event){
    panning = true;

    panStartX = event.clientX;
    panStartY = event.clientY;

    panStartOffsetX = offsetX;
    panStartOffsetY = offsetY;

    svg.style.cursor = "grabbing";
}

function startMove(event,element){
    moving = true;
    moveStartPoint = getPoint(event);
    originalAttrs = getOriginalAttrs(element);

    selectElement(element);
    svg.style.cursor = "move";
}

function startDraw(event){
    if(event.target.closest("#ui")) return;

    if(event.button === 1){
        event.preventDefault();
        startPan(event);
        return;
    }

    if(event.button !== 0) return;

    const p = getPoint(event);

    if(tool === "select"){
        if(isDrawableElement(event.target)){
            startMove(event,event.target);
        }else{
            clearSelection();
        }

        return;
    }

    if(event.target.tagName === "text" && event.target.dataset.editable === "true"){
        return;
    }

    if(tool === "text"){
        createText(p);
        return;
    }

    drawing = true;

    if(tool === "pen"){
        createPen(p);
    }

    if(tool === "arrow"){
        createArrow(p);
    }
}

function draw(event){
    if(panning){
        offsetX = panStartOffsetX + (event.clientX - panStartX);
        offsetY = panStartOffsetY + (event.clientY - panStartY);
        updateTransform();
        return;
    }

    if(moving && selectedElement){
        const p = getPoint(event);
        const dx = p.x - moveStartPoint.x;
        const dy = p.y - moveStartPoint.y;
        moveElement(selectedElement,dx,dy);
        return;
    }

    if(!drawing || !currentElement) return;

    const p = getPoint(event);

    if(tool === "pen"){
        const last = points[points.length-1];

        if(distance(p,last) < MIN_DISTANCE) return;

        points.push(p);
        currentElement.setAttribute("d",pointsToPath(points));
    }

    if(tool === "arrow"){
        currentElement.setAttribute("x2",p.x);
        currentElement.setAttribute("y2",p.y);
    }
}

function stopDraw(){
    if(drawing || moving){
        autoSave();
    }

    drawing = false;
    moving = false;
    panning = false;

    currentElement = null;
    points = [];
    moveStartPoint = null;
    originalAttrs = null;

    svg.style.cursor = tool === "select" ? "default" : "crosshair";
}

function selectColor(color){
    currentColor = color;
    colorPicker.value = color;

    colorButtons.forEach(btn=>{
        btn.classList.toggle(
            "active",
            btn.dataset.color.toLowerCase() === color.toLowerCase()
        );
    });
}

function selectWidth(width){
    currentWidth = Number(width);

    widthButtons.forEach(btn=>{
        btn.classList.toggle(
            "active",
            Number(btn.dataset.width) === currentWidth
        );
    });
}

function selectTool(selectedTool){
    tool = selectedTool;

    toolButtons.forEach(btn=>{
        btn.classList.toggle(
            "active",
            btn.dataset.tool === tool
        );
    });

    svg.style.cursor = tool === "select" ? "default" : "crosshair";
}

function newDrawing(){
    if(!confirm("¿Crear un dibujo nuevo? Se borrará el dibujo actual.")){
        return;
    }

    viewport.innerHTML = "";
    localStorage.removeItem(STORAGE_KEY);

    scale = 1;
    offsetX = 0;
    offsetY = 0;

    clearSelection();
    updateTransform();
}

function getFullSVG(){
    const clone = svg.cloneNode(true);

    clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    clone.setAttribute("width",window.innerWidth);
    clone.setAttribute("height",window.innerHeight);
    clone.setAttribute("viewBox",`0 0 ${window.innerWidth} ${window.innerHeight}`);

    clone.querySelectorAll(".selected").forEach(element=>{
        element.classList.remove("selected");
    });

    return `<?xml version="1.0" encoding="UTF-8"?>\n` + clone.outerHTML;
}

function saveToDisk(){
    const blob = new Blob(
        [getFullSVG()],
        {type:"image/svg+xml"}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "jocarsa-dibujo.svg";
    a.click();

    URL.revokeObjectURL(url);
}

function openFromDisk(file){
    const reader = new FileReader();

    reader.onload = function(){
        const parser = new DOMParser();
        const doc = parser.parseFromString(reader.result,"image/svg+xml");

        const loadedViewport = doc.querySelector("#viewport");

        if(loadedViewport){
            viewport.innerHTML = loadedViewport.innerHTML;
        }else{
            const loadedSvg = doc.querySelector("svg");
            viewport.innerHTML = loadedSvg ? loadedSvg.innerHTML : "";
        }

        clearSelection();
        autoSave();
    };

    reader.readAsText(file);
}

colorButtons.forEach(btn=>{
    btn.addEventListener("click",()=>{
        selectColor(btn.dataset.color);
    });
});

colorPicker.addEventListener("input",()=>{
    currentColor = colorPicker.value;
    colorButtons.forEach(btn=>btn.classList.remove("active"));
});

widthButtons.forEach(btn=>{
    btn.addEventListener("click",()=>{
        selectWidth(btn.dataset.width);
    });
});

toolButtons.forEach(btn=>{
    btn.addEventListener("click",()=>{
        selectTool(btn.dataset.tool);
    });
});

newBtn.addEventListener("click",newDrawing);
saveBtn.addEventListener("click",saveToDisk);
openBtn.addEventListener("click",()=>fileInput.click());

fileInput.addEventListener("change",()=>{
    if(fileInput.files[0]){
        openFromDisk(fileInput.files[0]);
    }

    fileInput.value = "";
});

svg.addEventListener("contextmenu",event=>event.preventDefault());
svg.addEventListener("pointerdown",startDraw);
svg.addEventListener("pointermove",draw);
window.addEventListener("pointerup",stopDraw);

svg.addEventListener("dblclick",event=>{
    if(event.target.tagName === "text" && event.target.dataset.editable === "true"){
        editText(event.target);
    }
});

svg.addEventListener("wheel",event=>{
    event.preventDefault();

    const rect = svg.getBoundingClientRect();

    const mouseX = event.clientX - rect.left;
    const mouseY = event.clientY - rect.top;

    const worldX = (mouseX - offsetX) / scale;
    const worldY = (mouseY - offsetY) / scale;

    const zoom = event.deltaY < 0 ? 1.1 : 0.9;

    scale *= zoom;
    scale = Math.max(0.1,Math.min(scale,20));

    offsetX = mouseX - worldX * scale;
    offsetY = mouseY - worldY * scale;

    updateTransform();

},{passive:false});

window.addEventListener("keydown",event=>{
    if(event.ctrlKey && event.key.toLowerCase() === "s"){
        event.preventDefault();
        saveToDisk();
    }

    if(event.ctrlKey && event.key.toLowerCase() === "o"){
        event.preventDefault();
        fileInput.click();
    }

    if((event.key === "Delete" || event.key === "Backspace") && selectedElement){
        selectedElement.remove();
        clearSelection();
        autoSave();
    }
});

window.addEventListener("beforeunload",autoSave);

autoLoad();
updateTransform();
selectTool("select");
</script>

</body>
</html>
