<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba visión Ollama</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:900px;margin:40px auto;padding:20px}
    textarea,input,button{width:100%;box-sizing:border-box;margin-top:10px;padding:10px}
    img{max-width:400px;display:block;margin-top:15px;border:1px solid #ccc}
    pre{background:#f4f4f4;padding:15px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>Enviar imagen para comentario</h1>

  <input id="url" value="https://covalently-untasked-daphne.ngrok-free.dev/api/">
  <input id="user" value="jocarsa">
  <input id="password" value="jocarsa">
  <input id="model" value="qwen3.5:latest">
  <textarea id="system" rows="4" placeholder="System opcional"></textarea>
  <textarea id="question" rows="4">¿Qué ves en esta imagen? Responde en español.</textarea>
  <input type="file" id="file" accept="image/*">
  <img id="preview" alt="">
  <button onclick="enviar()">Enviar imagen</button>

  <h2>Respuesta</h2>
  <pre id="out"></pre>

  <script>
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result;
          const base64 = result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('file').addEventListener('change', async function() {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        document.getElementById('preview').src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    async function enviar() {
      const out = document.getElementById('out');
      out.textContent = 'Cargando...';

      const file = document.getElementById('file').files[0];
      if (!file) {
        out.textContent = 'Selecciona una imagen';
        return;
      }

      try {
        const base64 = await fileToBase64(file);

        const payload = {
          user: document.getElementById('user').value,
          password: document.getElementById('password').value,
          action: 'generate',
          model: document.getElementById('model').value,
          system: document.getElementById('system').value,
          question: document.getElementById('question').value,
          images: [base64]
        };

        const res = await fetch(document.getElementById('url').value, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });

        const txt = await res.text();

        try {
          const json = JSON.parse(txt);
          out.textContent = JSON.stringify(json, null, 2);
        } catch(e) {
          out.textContent = txt;
        }
      } catch (err) {
        out.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
