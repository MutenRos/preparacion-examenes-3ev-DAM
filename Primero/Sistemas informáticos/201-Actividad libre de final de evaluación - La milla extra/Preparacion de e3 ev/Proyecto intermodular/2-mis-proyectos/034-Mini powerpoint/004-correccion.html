<!doctype html>
<html>
	<head>
		<style>
			body,html{
				padding:0px;
				margin:0px;
				width:100%;
				height:100%;
				scroll-behavior:smooth;
			}

			article{
				width:100%;
				height:100%;
				box-sizing:border-box;
				padding:50px;
			}

			footer{
				position:fixed;
				bottom:0px;
				left:0px;
				background:white;
				padding:10px;
			}
		</style>
	</head>
	<body>

		<article>
			<h3>Diapositiva 1</h3>
			<p>Este es el texto de la diapositiva 1</p>
		</article>

		<article>
			<h3>Diapositiva 2</h3>
			<p>Este es el texto de la diapositiva 2</p>
		</article>

		<article>
			<h3>Diapositiva 3</h3>
			<p>Este es el texto de la diapositiva 3</p>
		</article>

		<article>
			<h3>Diapositiva 4</h3>
			<p>Este es el texto de la diapositiva 4</p>
		</article>

		<footer>
			<button>1</button>
			<button>2</button>
			<button>3</button>
			<button>4</button>
		</footer>

		<script>

			let botones = document.querySelectorAll("button")

			botones.forEach(function(boton){

				boton.onclick = function(){

					let numero = this.textContent * 1

					window.scrollTo({
						top:(numero-1) * window.innerHeight,
						behavior:"smooth"
					})

				}

			})

		</script>

	</body>
</html>
