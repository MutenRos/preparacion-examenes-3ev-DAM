<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Creador de esquemas SVG · DAM</title>
<style>
:root{--bg:#f1f5f9;--panel:#fff;--border:#cbd5e1;--text:#0f172a;--muted:#64748b;--brand:#0ea5e9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh}
.mock-banner{background:#fef3c7;border-bottom:1px solid #f59e0b;padding:8px;text-align:center;font:500 .85rem/1.4 inherit;color:#78350f}
.app{display:grid;grid-template-rows:auto 1fr;height:calc(100vh - 32px)}
.bar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.brand{font-weight:800;color:var(--brand);font-size:1.05em;margin-right:8px;display:flex;align-items:center;gap:6px}
.bar .sep{width:1px;background:var(--border);height:24px;margin:0 4px}
.bar button{background:transparent;border:1px solid transparent;padding:6px 10px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.88em;color:var(--text);display:flex;align-items:center;gap:5px}
.bar button:hover{background:#f1f5f9}
.bar button.sel{background:#e0f2fe;color:var(--brand);border-color:var(--brand)}
.zoom{margin-left:auto;display:flex;gap:4px;align-items:center;font-size:.85em;color:var(--muted)}
.body{display:grid;grid-template-columns:200px 1fr 240px;overflow:hidden}
.tools{background:var(--panel);border-right:1px solid var(--border);padding:14px 12px;overflow:auto}
.tools h4{font-size:.7em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.shape-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px}
.shape-grid button{aspect-ratio:1;background:#f8fafc;border:1px solid var(--border);border-radius:6px;cursor:pointer;display:grid;place-items:center}
.shape-grid button:hover{border-color:var(--brand)}
.shape-grid button.sel{background:#e0f2fe;border-color:var(--brand)}
.layers{font-size:.85em}
.layers .lr{display:flex;align-items:center;padding:6px 8px;border-radius:4px;gap:8px;cursor:pointer}
.layers .lr.sel{background:#e0f2fe}
.layers .lr:hover:not(.sel){background:#f1f5f9}
.canvas-wrap{background:#e2e8f0;display:flex;align-items:center;justify-content:center;overflow:auto;padding:20px;background-image:radial-gradient(#cbd5e1 1px,transparent 1px);background-size:20px 20px}
.canvas{background:#fff;width:700px;height:480px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.08);border-radius:4px}
.props{background:var(--panel);border-left:1px solid var(--border);padding:16px;overflow:auto;font-size:.88em}
.props h4{font-size:.7em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;letter-spacing:.5px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:.78em;color:var(--muted);margin-bottom:4px}
.fld input,.fld select{width:100%;border:1px solid var(--border);background:#fff;padding:6px 9px;border-radius:5px;font-family:inherit;font-size:.86em}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.colors{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.colors span{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent}
.colors span.sel{border-color:var(--text)}
.foot{padding:6px 16px;background:var(--panel);border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:.78em;color:var(--muted)}
@media(max-width:900px){.body{grid-template-columns:1fr}.tools,.props{display:none}}
</style></head><body>
<div class="mock-banner">📐 <strong>Demo</strong> · Editor SVG con formas, texto y conexiones · sin backend</div>
<div class="app">
  <div class="bar">
    <span class="brand">📐 Esquemator</span>
    <button>📄 Nuevo</button>
    <button>📂 Abrir</button>
    <button>💾 Guardar SVG</button>
    <div class="sep"></div>
    <button>↶ Deshacer</button>
    <button>↷ Rehacer</button>
    <div class="sep"></div>
    <button class="sel">🖱 Seleccionar</button>
    <button>✏️ Mano alzada</button>
    <button>📷 Exportar PNG</button>
    <div class="zoom"><button>−</button><span>100%</span><button>+</button></div>
  </div>
  <div class="body">
    <aside class="tools">
      <h4>Formas</h4>
      <div class="shape-grid">
        <button class="sel" title="Rectángulo"><svg width="28" height="28"><rect x="4" y="6" width="20" height="16" fill="none" stroke="#0ea5e9" stroke-width="2"/></svg></button>
        <button title="Círculo"><svg width="28" height="28"><circle cx="14" cy="14" r="9" fill="none" stroke="#0f172a" stroke-width="2"/></svg></button>
        <button title="Triángulo"><svg width="28" height="28"><polygon points="14,4 24,22 4,22" fill="none" stroke="#0f172a" stroke-width="2"/></svg></button>
        <button title="Línea"><svg width="28" height="28"><line x1="4" y1="22" x2="24" y2="6" stroke="#0f172a" stroke-width="2"/></svg></button>
        <button title="Flecha"><svg width="28" height="28"><line x1="4" y1="14" x2="22" y2="14" stroke="#0f172a" stroke-width="2"/><polyline points="18,10 22,14 18,18" fill="none" stroke="#0f172a" stroke-width="2"/></svg></button>
        <button title="Texto"><svg width="28" height="28"><text x="14" y="20" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">T</text></svg></button>
      </div>
      <h4>Capas (4)</h4>
      <div class="layers">
        <div class="lr sel">▭ Rectángulo · "Inicio"</div>
        <div class="lr">○ Círculo · "Proceso"</div>
        <div class="lr">↗ Flecha</div>
        <div class="lr">T  Texto · "Esquema"</div>
      </div>
    </aside>
    <main class="canvas-wrap">
      <svg class="canvas" viewBox="0 0 700 480">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
          </marker>
        </defs>
        <text x="350" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Mi esquema</text>
        <rect x="80" y="120" width="160" height="80" rx="8" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
        <text x="160" y="165" text-anchor="middle" font-size="16" font-weight="600" fill="#0c4a6e">Inicio</text>
        <circle cx="430" cy="160" r="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
        <text x="430" y="165" text-anchor="middle" font-size="14" font-weight="600" fill="#78350f">Proceso</text>
        <rect x="540" y="280" width="120" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
        <text x="600" y="320" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">Fin</text>
        <polygon points="200,330 280,290 360,330 280,370" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
        <text x="280" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">¿OK?</text>
        <line x1="240" y1="160" x2="375" y2="160" stroke="#0f172a" stroke-width="2" marker-end="url(#arr)"/>
        <line x1="430" y1="210" x2="280" y2="290" stroke="#0f172a" stroke-width="2" marker-end="url(#arr)"/>
        <line x1="360" y1="330" x2="535" y2="315" stroke="#0f172a" stroke-width="2" marker-end="url(#arr)"/>
        <g stroke="#0ea5e9" stroke-dasharray="4 4" fill="none">
          <rect x="78" y="118" width="164" height="84" rx="8"/>
          <circle cx="82" cy="120" r="3" fill="#0ea5e9"/>
          <circle cx="238" cy="120" r="3" fill="#0ea5e9"/>
          <circle cx="82" cy="200" r="3" fill="#0ea5e9"/>
          <circle cx="238" cy="200" r="3" fill="#0ea5e9"/>
        </g>
      </svg>
    </main>
    <aside class="props">
      <h4>Propiedades — Rectángulo</h4>
      <div class="fld"><label>Texto</label><input value="Inicio"></div>
      <div class="row">
        <div class="fld"><label>X</label><input value="80"></div>
        <div class="fld"><label>Y</label><input value="120"></div>
      </div>
      <div class="row">
        <div class="fld"><label>Ancho</label><input value="160"></div>
        <div class="fld"><label>Alto</label><input value="80"></div>
      </div>
      <div class="fld"><label>Borde</label><input value="2px" type="text"></div>
      <div class="fld"><label>Radio esquinas</label><input value="8"></div>
      <div class="fld"><label>Relleno</label>
        <div class="colors">
          <span style="background:#bae6fd" class="sel"></span>
          <span style="background:#fef3c7"></span>
          <span style="background:#dcfce7"></span>
          <span style="background:#fee2e2"></span>
          <span style="background:#e9d5ff"></span>
          <span style="background:#fff;border-color:var(--border)"></span>
        </div>
      </div>
      <div class="fld"><label>Trazo</label>
        <div class="colors">
          <span style="background:#0ea5e9" class="sel"></span>
          <span style="background:#f59e0b"></span>
          <span style="background:#22c55e"></span>
          <span style="background:#ef4444"></span>
          <span style="background:#0f172a"></span>
        </div>
      </div>
    </aside>
  </div>
  <div class="foot"><span>esquema.svg · 4 nodos · 3 conexiones</span><span>x: 240, y: 160</span></div>
</div>
</body></html>
