<!doctype html>
<html lang="es">
	<head>
		<title></title>
		<style>
			html,body{
				padding:0;
				margin:0;
				width:100%;
				height:100%;
				font-family:Arial, sans-serif;
				background:#f5f6fa;
			}

			body{
				display:flex;
				overflow:hidden;
			}

			body>div{
				border-right:1px solid #dcdde1;
				padding:20px;
				box-sizing:border-box;
			}

			#bandejas{
				flex:1;
				background:linear-gradient(180deg,#2f3640,#353b48);
				display:flex;
				flex-direction:column;
				gap:12px;
			}

			#bandejas a{
				color:white;
				text-decoration:none;
				background:rgba(255,255,255,0.08);
				padding:14px;
				display:block;
				border-radius:8px;
				transition:all 0.3s;
				font-weight:bold;
			}

			#bandejas a:hover{
				background:rgba(255,255,255,0.18);
				transform:translateX(4px);
			}

			#mensajes{
				flex:2;
				background:#f1f2f6;
				display:flex;
				flex-direction:column;
				gap:14px;
				overflow-y:auto;
			}

			#mensajes article{
				background:white;
				padding:16px;
				border-radius:10px;
				box-shadow:0 2px 8px rgba(0,0,0,0.08);
				transition:all 0.3s;
				cursor:pointer;
			}

			#mensajes article:hover{
				transform:translateY(-2px);
				box-shadow:0 6px 18px rgba(0,0,0,0.12);
			}

			#mensajes h3{
				margin:0 0 8px 0;
				font-size:16px;
				color:#2f3640;
			}

			#mensajes time{
				font-size:12px;
				color:#718093;
				display:block;
				margin-bottom:8px;
			}

			#mensajes p{
				margin:0;
				color:#555;
				font-size:14px;
			}

			#conversacion{
				flex:3;
				background:white;
				padding:30px;
				box-sizing:border-box;
				display:flex;
				flex-direction:column;
				justify-content:flex-start;
				position:relative;
			}

			#conversacion::before{
				content:"Selecciona un mensaje";
				color:#b2bec3;
				font-size:20px;
				position:absolute;
				top:50%;
				left:50%;
				transform:translate(-50%,-50%);
			}
		</style>
	</head>
	<body>
		<div id="bandejas">
			<a href="">Recibidos</a>
			<a href="">Enviados</a>
			<a href="">Papelera</a>
			<a href="">No deseado</a>
		</div>
		<div id="mensajes">
			<article><h3>Titulo del mensaje</h3><time>2026-03-12</time><p>Descripcion del mensaje</p></article>
			<article><h3>Titulo del mensaje</h3><time>2026-03-12</time><p>Descripcion del mensaje</p></article>
			<article><h3>Titulo del mensaje</h3><time>2026-03-12</time><p>Descripcion del mensaje</p></article>
			<article><h3>Titulo del mensaje</h3><time>2026-03-12</time><p>Descripcion del mensaje</p></article>
		</div>
		<div id="conversacion"></div>
	</body>
</html>
