<!doctype html>
<html>
	<head>
		<style>
			canvas{border:1px solid grey;}
		</style>
	</head>
	<body>
		<canvas></canvas>
		<script>
			let lienzo = document.querySelector("canvas")
			lienzo.width = 512
			lienzo.height = 512
			
			let contexto = lienzo.getContext("2d")
			contexto.strokeStyle = "red"
			contexto.beginPath()
			contexto.arc(100,100,40,0,Math.PI*2)
			contexto.stroke()
		</script>
	</body>
</html>
