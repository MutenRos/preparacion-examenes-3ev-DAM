<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Canvas draw</title>
	<style>
		body{
			margin:0;
			padding:20px;
			background:#f0f0f0;
			font-family:Arial,sans-serif;
		}
		.controls{
			width:800px;
			margin:0 auto 20px auto;
			padding:15px;
			background:white;
			border:1px solid #ccc;
			display:flex;
			gap:20px;
			align-items:center;
		}
		canvas{
			display:block;
			margin:0 auto;
			border:1px solid #999;
			background:white;
			cursor:crosshair;
		}
		label{
			display:flex;
			align-items:center;
			gap:10px;
		}
	</style>
</head>
<body>
	<div class="controls">
		<label>
			Color:
			<input type="color" id="color" value="#000000">
		</label>

		<label>
			Width:
			<input type="range" id="width" min="1" max="50" value="2">
			<span id="widthValue">2</span>
		</label>
	</div>

	<canvas id="lienzo" width="800" height="500"></canvas>

	<script>
		let canvas = document.getElementById("lienzo")
		let contexto = canvas.getContext("2d")

		let colorInput = document.getElementById("color")
		let widthInput = document.getElementById("width")
		let widthValue = document.getElementById("widthValue")

		let dibujando = false
		let anteriorX = 0
		let anteriorY = 0

		widthInput.addEventListener("input", function(){
			widthValue.textContent = widthInput.value
		})

		canvas.addEventListener("mousedown", function(e){
			dibujando = true
			anteriorX = e.offsetX
			anteriorY = e.offsetY
		})

		canvas.addEventListener("mousemove", function(e){
			if(dibujando == false){return}

			contexto.strokeStyle = colorInput.value
			contexto.lineWidth = widthInput.value
			contexto.lineCap = "round"
			contexto.lineJoin = "round"

			contexto.beginPath()
			contexto.moveTo(anteriorX, anteriorY)
			contexto.lineTo(e.offsetX, e.offsetY)
			contexto.stroke()

			anteriorX = e.offsetX
			anteriorY = e.offsetY
		})

		canvas.addEventListener("mouseup", function(){
			dibujando = false
		})

		canvas.addEventListener("mouseleave", function(){
			dibujando = false
		})
	</script>
</body>
</html>
