<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8">
		<style>
			*{
				box-sizing:border-box;
			}
			html,body{
				width:100%;
				height:100%;
				margin:0;
				padding:0;
			}
			body{
				display:flex;
				justify-content:center;
				align-items:center;
				font-family:monospace;
				background:url(blancotrans.png),url(blancotrans.png),url(fondo.jpg);
				background-size:cover;
				background-position:center;
				overflow:hidden;
			}
			main{
				width:340px;
				height:72px;
				border:1px solid rgba(255,255,255,0.18);
				padding:14px;
				display:flex;
				flex-direction:column;
				justify-content:flex-end;
				gap:12px;
				overflow:hidden;
				background:rgba(0,0,0,0.45);
				transition:height 0.45s ease, box-shadow 0.3s ease, background 0.3s ease;
				backdrop-filter:blur(10px);
				-webkit-backdrop-filter:blur(10px);
				border-radius:14px;
				box-shadow:0 12px 30px rgba(0,0,0,0.35);
			}
			main.abierto{
				height:540px;
				justify-content:space-between;
				background:rgba(0,0,0,0.52);
				box-shadow:0 18px 40px rgba(0,0,0,0.45);
			}
			section{
				display:flex;
				flex-direction:column;
				gap:10px;
				flex:1;
				min-height:0;
				overflow-y:auto;
				overflow-x:hidden;
				padding-right:6px;
				opacity:0;
				transform:translateY(8px);
				transition:opacity 0.3s ease, transform 0.3s ease;
				pointer-events:none;
				scroll-behavior:smooth;
				scrollbar-width:thin;
				scrollbar-color:rgba(255,255,255,0.25) transparent;
			}
			main.abierto section{
				opacity:1;
				transform:translateY(0);
				pointer-events:auto;
			}
			section::-webkit-scrollbar{
				width:8px;
			}
			section::-webkit-scrollbar-track{
				background:transparent;
				border-radius:10px;
			}
			section::-webkit-scrollbar-thumb{
				background:rgba(255,255,255,0.20);
				border-radius:10px;
				border:2px solid transparent;
				background-clip:padding-box;
			}
			section::-webkit-scrollbar-thumb:hover{
				background:rgba(255,255,255,0.35);
				background-clip:padding-box;
			}
			input{
				width:100%;
				border:1px solid rgba(255,255,255,0.14);
				padding:12px 14px;
				outline:none;
				color:white;
				font-family:monospace;
				background:rgba(255,255,255,0.08);
				border-radius:10px;
				transition:border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
				flex-shrink:0;
			}
			input::placeholder{
				color:rgba(255,255,255,0.55);
			}
			input:focus{
				border-color:rgba(255,255,255,0.35);
				background:rgba(255,255,255,0.12);
				box-shadow:0 0 0 3px rgba(255,255,255,0.08);
			}
			article{
				padding:10px 12px;
				border-radius:12px;
				max-width:82%;
				width:fit-content;
				word-break:break-word;
				line-height:1.45;
				box-shadow:0 4px 10px rgba(0,0,0,0.12);
				animation:aparecer 0.25s ease;
			}
			.p{
				background:rgb(200,255,200);
				border-radius:6px 12px 12px 12px;
				align-self:flex-start;
				color:#1f2a1f;
			}
			.r{
				background:rgb(200,255,255);
				border-radius:12px 6px 12px 12px;
				align-self:flex-end;
				color:#1b2a2a;
			}
			@keyframes aparecer{
				from{
					opacity:0;
					transform:translateY(6px);
				}
				to{
					opacity:1;
					transform:translateY(0);
				}
			}
		</style>
	</head>
	<body>
		<main>
			<section></section>
			<input type="text" placeholder="Introduce tu pregunta">
		</main>
		<script>
			let entrada = document.querySelector("input")
			let seccion = document.querySelector("section")
			let main = document.querySelector("main")
			let primeraPregunta = true

			entrada.onkeypress = function(tecla){
				if(tecla.charCode == 13){
					let valor = this.value.trim()
					if(valor == ""){return}

					this.value = ""

					if(primeraPregunta){
						main.classList.add("abierto")
						primeraPregunta = false
					}

					let articuloPregunta = document.createElement("article")
					articuloPregunta.classList.add("p")
					articuloPregunta.textContent = valor
					seccion.appendChild(articuloPregunta)
					seccion.scrollTop = seccion.scrollHeight

					fetch("b002-back con IA.php", {
						method: "POST",
						headers: {
							"Content-Type": "application/json"
						},
						body: JSON.stringify({ mensaje: valor })
					})
					.then(function(respuesta){
						return respuesta.text()
					})
					.then(function(datos){
						let articuloRespuesta = document.createElement("article")
						articuloRespuesta.classList.add("r")
						articuloRespuesta.textContent = datos
						seccion.appendChild(articuloRespuesta)
						seccion.scrollTop = seccion.scrollHeight
					})
				}
			}
		</script>
	</body>
</html>
