<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>A-Frame GLB Example</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>

<a-scene renderer="colorManagement: true">

  <!-- assets -->
  <a-assets>
    <a-asset-item id="suzanne" src="008-mesa con cilindros.glb"></a-asset-item>
  </a-assets>

  <!-- directional light -->
  <a-entity
    light="type: directional; color: #ffffff; intensity: 0.6"
    position="2 4 2">
  </a-entity>

  <!-- ambient light -->
  <a-entity
    light="type: ambient; color: #ffffff; intensity: 0.4">
  </a-entity>

  <!-- hemisphere light -->
  <a-entity
    light="type: hemisphere; color: #ffffff; groundColor: #cccccc; intensity: 0.2">
  </a-entity>

  <!-- floor -->
  <a-plane
    rotation="-90 0 0"
    width="10"
    height="10"
    color="#cccccc">
  </a-plane>

  <!-- model -->
  <a-entity
    gltf-model="#suzanne"
    position="0 0 0"
    scale="2 2 2">
  </a-entity>

  <!-- camera -->
  <a-entity position="0 1 3">
    <a-camera></a-camera>
  </a-entity>

</a-scene>

</body>
</html>
