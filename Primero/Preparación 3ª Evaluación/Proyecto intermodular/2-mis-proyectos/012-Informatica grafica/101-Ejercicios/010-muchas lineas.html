<!doctype html>
<html>
	<head>
		<style>
			canvas{border:1px solid grey;}
		</style>
	</head>
	<body>
		<canvas></canvas>
		<script>
			let lienzo = document.querySelector("canvas")
			lienzo.width = 512
			lienzo.height = 512
			
			let contexto = lienzo.getContext("2d")
			contexto.beginPath()
			contexto.moveTo(300,300)
			for(let i = 0;i<1000;i++){
				contexto.lineTo(Math.random()*512,Math.random()*512)
			}
			contexto.stroke()
		</script>
	</body>
</html>
